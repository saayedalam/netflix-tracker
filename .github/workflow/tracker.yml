name: Netflix Canada Top 10 Tracker

on:
  schedule:
    # Runs every Tuesday at 9 AM UTC (Netflix updates weekly, usually Tuesdays)
    - cron: "0 9 * * 2"
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  check-top10:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run tracker
        env:
          EMAIL_FROM:    ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:      ${{ secrets.EMAIL_TO }}
          GMAIL_APP_PWD: ${{ secrets.GMAIL_APP_PWD }}
        run: python tracker.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update top10 state [$(date -u '+%Y-%m-%d')]"
          git push
